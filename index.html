<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Free-Tier Hub 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-950 text-slate-100 font-sans">

    <!-- Header -->
    <header class="py-12 px-6 text-center border-b border-slate-800 bg-slate-900/50">
        <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-4">
            AI FREE ENGINE HUB
        </h1>
        <p class="text-slate-400 text-lg max-w-2xl mx-auto">A curated directory of high-performance AI engines you can use for $0 in 2026.</p>
    </header>

    <main class="max-w-7xl mx-auto p-8 grid grid-cols-1 lg:grid-cols-3 gap-10">
        
        <!-- Section: The Directory -->
        <div class="lg:col-span-2">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
                <i class="fas fa-microchip text-cyan-400"></i> 2026 Free Engines
            </h2>
            
            <div id="engine-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Data will be automatically filled here -->
            </div>
        </div>

        <!-- Section: Interactive Chat Tool -->
        <div class="bg-slate-900 rounded-3xl border border-slate-800 flex flex-col h-[650px] shadow-2xl relative overflow-hidden">
            <div class="p-5 border-b border-slate-800 bg-slate-800/50 backdrop-blur-md flex justify-between items-center">
                <span class="font-bold tracking-tight"><i class="fas fa-bolt text-yellow-400 mr-2"></i>Live Assistant</span>
                <span class="text-[10px] bg-cyan-500/20 text-cyan-400 px-2 py-1 rounded-full font-mono uppercase">Gemini 3 Flash</span>
            </div>
            
            <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 scroll-smooth">
                <div class="bg-slate-800 p-4 rounded-2xl rounded-tl-none border border-slate-700 text-sm leading-relaxed">
                    Welcome! Paste your **Gemini API Key** below to activate this terminal.
                </div>
            </div>

            <div class="p-5 bg-slate-900 border-t border-slate-800">
                <input type="password" id="api-key" placeholder="Paste Gemini API Key..." 
                       class="w-full mb-3 bg-slate-950 border border-slate-700 p-3 rounded-xl text-xs outline-none focus:border-cyan-500 transition-all">
                <div class="flex gap-2">
                    <input type="text" id="user-msg" placeholder="Type a message..." 
                           class="flex-1 bg-slate-950 border border-slate-700 p-3 rounded-xl outline-none focus:border-cyan-500 transition-all">
                    <button onclick="askAI()" class="bg-gradient-to-br from-cyan-500 to-blue-600 hover:scale-105 active:scale-95 text-white w-12 h-12 rounded-xl transition-all shadow-lg shadow-cyan-500/20">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Data for your directory (Updated for 2026)
        const engines = [
            { name: "Gemini 3 Flash", type: "Logic & Code", limit: "15 Requests/Min", link: "https://aistudio.google.com/", icon: "fa-google" },
            { name: "Groq Cloud", type: "Ultra-Fast Llama 4", limit: "Free Rate Limits", link: "https://groq.com/", icon: "fa-bolt-lightning" },
            { name: "SiliconFlow", type: "Unified All-in-One", limit: "Generous Free Tier", link: "https://siliconflow.com/", icon: "fa-layer-group" },
            { name: "DeepSeek v3", type: "Deep Reasoning", limit: "Open Beta Access", link: "https://chat.deepseek.com/", icon: "fa-brain" },
            { name: "OpenRouter", type: "Model Aggregator", limit: "Lists 100% Free Models", link: "https://openrouter.ai/", icon: "fa-share-nodes" },
            { name: "Hugging Face", type: "Serverless Inference", limit: "Free Community API", link: "https://huggingface.co/", icon: "fa-face-smiling-hands" }
        ];

        // Render the list
        const listDiv = document.getElementById('engine-list');
        engines.forEach(app => {
            listDiv.innerHTML += `
                <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 hover:border-cyan-500/50 transition-all group hover:-translate-y-1">
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-10 h-10 bg-slate-800 rounded-lg flex items-center justify-center">
                            <i class="fas ${app.icon} text-xl text-cyan-400"></i>
                        </div>
                        <a href="${app.link}" target="_blank" class="text-[10px] font-bold text-cyan-400 border border-cyan-400/30 px-3 py-1 rounded-full group-hover:bg-cyan-500 group-hover:text-white transition-colors">VISIT</a>
                    </div>
                    <h3 class="font-bold text-lg text-white">${app.name}</h3>
                    <p class="text-xs text-slate-500 mb-2">${app.type}</p>
                    <div class="text-[10px] text-emerald-400 font-mono tracking-tighter bg-emerald-400/5 px-2 py-1 rounded w-fit">${app.limit}</div>
                </div>
            `;
        });

        // The Brain (AI Logic)
        async function askAI() {
            const msgInput = document.getElementById('user-msg');
            const keyInput = document.getElementById('api-key');
            const chatBox = document.getElementById('chat-box');

            if(!msgInput.value || !keyInput.value) return alert("Please enter a message and your Gemini API Key!");

            const userText = msgInput.value;
            chatBox.innerHTML += `<div class="bg-blue-600 p-4 rounded-2xl rounded-tr-none ml-auto max-w-[85%] text-sm shadow-md">${userText}</div>`;
            msgInput.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch(\`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=\${keyInput.value}\`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] })
                });
                const data = await res.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                chatBox.innerHTML += `<div class="bg-slate-800 p-4 rounded-2xl rounded-tl-none mr-auto max-w-[85%] text-sm border border-slate-700 leading-relaxed">${aiResponse}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch(e) {
                chatBox.innerHTML += `<div class="text-red-400 text-xs italic">System Error: Check API key validity.</div>`;
            }
        }
    </script>
</body>
</html>
